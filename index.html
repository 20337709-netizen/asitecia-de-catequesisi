<!DOCTYPE html>
<html>
<head>
<title>Mis Tareas</title>

<style>
body{
font-family:Arial;
background:#f0f2f5;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:400px;
margin:auto;
}

li{
margin:5px 0;
}

button{
margin-left:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>📋 Lista de Tareas</h2>

<input id="tarea" placeholder="Nueva tarea">
<button onclick="agregar()">Agregar</button>

<ul id="lista"></ul>

</div>

<script>

let tareas = JSON.parse(localStorage.getItem("tareas")) || [];

function guardar(){
localStorage.setItem("tareas", JSON.stringify(tareas));
}

function mostrar(){

let lista = document.getElementById("lista");
lista.innerHTML="";

tareas.forEach((t,i)=>{

lista.innerHTML += `
<li>
${t}
<button onclick="borrar(${i})">❌</button>
</li>
`;

});

}

function agregar(){

let texto = document.getElementById("tarea").value;

if(texto=="") return;

tareas.push(texto);

guardar();
mostrar();

document.getElementById("tarea").value="";

}

function borrar(i){

tareas.splice(i,1);

guardar();
mostrar();

}

mostrar();

</script>

</body>
</html>
